<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">Attendify</a>
    </div>
    <nav>
        <ul>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="index.html#demo">Demo</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <div class="auth-buttons">
        <button id="loginBtnHeader">Login</button>
        <button id="signupBtnHeader">Sign Up</button>
    </div>
</header>

<main>
    <section class="contact">
        <div class="contact-content">
            <h1>Contact Us</h1>
            <p>If you have any questions or feedback, please feel free to contact us.</p>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Your Name">
                    <input type="email" placeholder="Your Email">
                    <textarea placeholder="Your Message"></textarea>
                </div>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2024 Attendify. All rights reserved.</p>
</footer>

<script src="index.js"></script>
</body>
</html>
